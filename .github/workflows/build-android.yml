name: Build & Release Android APK

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Increase swap space
        run: |
          sudo swapoff -a
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          jq --arg v "$VERSION" '.expo.version = $v' app.json > app.json.tmp && mv app.json.tmp app.json
          echo "Version set to $VERSION"

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > google-services.json

      - name: Generate Android project
        run: npx expo prebuild --platform android --no-install
        env:
          CI: '1'

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > android/app/release.keystore

      - name: Build APK
        run: |
          cd android && chmod +x gradlew
          ./gradlew assembleRelease -x lintVitalAnalyzeRelease -x lint \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.daemon=false \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/frontend/android/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
        env:
          EXPO_PUBLIC_API_BASE_URL: https://swibber-app-gf3u.onrender.com/api/v1
          EXPO_PUBLIC_WS_URL: https://swibber-app-gf3u.onrender.com
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          EXPO_PUBLIC_RAZORPAY_KEY_ID: ${{ secrets.EXPO_PUBLIC_RAZORPAY_KEY_ID }}

      - name: Rename APK
        run: mv android/app/build/outputs/apk/release/app-release.apk swibber-${{ github.ref_name }}.apk

      - uses: softprops/action-gh-release@v2
        with:
          name: Swibber ${{ github.ref_name }}
          generate_release_notes: true
          files: frontend/swibber-${{ github.ref_name }}.apk
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify backend of new version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APK_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/swibber-${{ github.ref_name }}.apk"
          curl -s -f -X POST \
            -H "Content-Type: application/json" \
            -H "x-webhook-secret: ${{ secrets.INTERNAL_WEBHOOK_SECRET }}" \
            -d "{\"version\": \"$VERSION\", \"apkUrl\": \"$APK_URL\"}" \
            https://swibber-app-gf3u.onrender.com/api/v1/config/webhook/version \
          && echo "Backend notified: v$VERSION" || echo "Warning: backend notify failed (non-fatal)"
