name: Build & Release Android APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Cloud build — JSON output goes to stdout, logs to stderr
      - name: Build APK
        run: |
          eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --json \
            2>eas_logs.txt > eas_output.json || (cat eas_logs.txt && exit 1)

      # Parse the artifact URL from the JSON and download the APK
      - name: Download APK
        run: |
          BUILD_URL=$(jq -r '.[0].artifacts.buildUrl' eas_output.json)
          echo "Build URL: $BUILD_URL"
          curl -L "$BUILD_URL" -o swibber-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Swibber ${{ github.ref_name }}
          generate_release_notes: true
          files: frontend/swibber-${{ github.ref_name }}.apk
          token: ${{ secrets.GITHUB_TOKEN }}
